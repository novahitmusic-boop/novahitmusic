<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novahit — Yakında</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; margin-bottom: 1rem; }
    .logo span { color: #a78bfa; }
    h1 { font-size: 1.3rem; color: #a78bfa; margin-bottom: 0.5rem; }
    p { color: #666; font-size: 0.95rem; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #a78bfa;
      animation: pulse 1.5s infinite; margin: 2rem auto 0; }
    @keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
  </style>
</head>
<body>
  <div>
    <div class="logo">nova<span>hit</span></div>
    <h1>Çok Yakında</h1>
    <p>Hazırlıklar devam ediyor…</p>
    <div class="dot"></div>
  </div>
</body>
</html>
